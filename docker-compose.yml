services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-app}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ADEME_FACTORS_URL: ${ADEME_FACTORS_URL:-https://data.ademe.fr/}
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:8080}
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-4200}:80"

volumes:
  db_data:
